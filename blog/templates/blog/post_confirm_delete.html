<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление поста — Мой блог</title>
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
</head>
<body>
    <div class="container">
        <nav>
            <a href="{% url 'home' %}">🏠 Главная</a>
            <a href="{% url 'about' %}">ℹ️ О нас</a>
            <a href="{% url 'post_list' %}">📝 Все посты</a>
            <a href="{% url 'post_create' %}">✏️ Создать пост</a>
        </nav>

        <header>
            <h1>🗑️ Удаление поста</h1>
        </header>

        <div class="delete-confirm">
            <p>Вы уверены, что хотите удалить пост <strong>"{{ post.title }}"</strong>?</p>
            <p style="color: #d32f2f; font-size: 14px;">Это действие невозможно отменить!</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn-danger">🗑️ Да, удалить</button>
                    <a href="{% url 'post_detail' post.id %}" class="btn-secondary">Отмена</a>
                </div>
            </form>
        </div>

        <footer>
            <p>© 2026 Мой блог. Все права защищены.</p>
        </footer>
    </div>
</body>
</html>
